<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - GreenMinds</title>
    <link rel="icon" type="image/png" href="../flower.png">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <h2>🌿 GreenMinds</h2>
      <nav>
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#search">Search Plant</a>
      </nav>
    </header>

    <!-- LOGIN / SIGNUP SECTION -->
    <section class="login-hero">
      <div class="login-card">
        <!-- LOGIN FORM -->
        <div id="loginSection">
          <h2>Welcome Back 🌱</h2>
          <p id="selectedPlant"></p>
          <form onsubmit="handleLogin(event)">
            <input type="email" id="email" placeholder="Email" required />
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <button type="submit">Login</button>
          </form>
          <p id="message"></p>
          <p>
            Don't have an account?
            <a href="#" onclick="toggleSignup(true)">Sign up</a>
          </p>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupSection" style="display: none">
          <h2>Create Account 🌿</h2>
          <form onsubmit="handleSignup(event)">
            <input
              type="text"
              id="signupUsername"
              placeholder="Username"
              required
            />
            <input type="email" id="signupEmail" placeholder="Email" required />
            <input
              type="password"
              id="signupPassword"
              placeholder="Password (min. 8 characters)"
              required
            />
            <button type="submit">Sign Up</button>
          </form>
          <p id="signupMessage"></p>
          <p>
            Already have an account?
            <a href="#" onclick="toggleSignup(false)">Log in</a>
          </p>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
